<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sadri 💕</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff4d6d, #ff9a9e, #fad0c4);
            min-height: 100vh;
        }

        .center {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            color: white;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #ff4d6d;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .main {
            display: none;
        }

        .navbar {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.2);
            padding: 15px;
            position: sticky;
            top: 0;
            backdrop-filter: blur(10px);
        }

        .navbar button {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
        }

        .section {
            display: none;
            padding: 30px;
            text-align: center;
            color: white;
        }

        .active {
            display: block;
        }

        .gallery img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            margin: 10px;
            border-radius: 15px;
            border: 3px solid white;
        }

        .heart {
            font-size: 60px;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="center" id="loginPage">
    <div class="login-box">
        <h2>Sadri 💕 Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Enter</button>
        <p id="error"></p>
    </div>
</div>

<!-- MAIN -->
<div class="main" id="mainPage">

    <div class="navbar">
        <button onclick="show('home')">Home</button>
        <button onclick="show('love')">Love</button>
        <button onclick="show('gallery')">Gallery</button>
        <button onclick="show('messages')">Messages</button>
        <button onclick="show('about')">About</button>
    </div>

    <div id="home" class="section active">
        <div class="heart">❤️</div>
        <h1>Welcome Sadri 💕</h1>
        <p>Made with love by Zakaria 💖</p>
    </div>

    <div id="love" class="section">
        <h1>Our Love 💕</h1>
        <p>Forever and always ❤️</p>
    </div>

    <div id="gallery" class="section">
        <h1>Her Pictures 📸</h1>
        <div class="gallery">
            <img src="IMG-20260308-WA0005.jpg" alt="Sadri">
            <img src="IMG-20260311-WA0054.jpg" alt="Sadri">
            <img src="IMG-20260322-WA0010.jpg" alt="Sadri">
            <img src="IMG-20260322-WA0021.jpg" alt="Sadri">
            <img src="IMG-20260401-WA0015.jpg" alt="Sadri">
            <img src="IMG-20260401-WA0029.jpg" alt="Sadri">
        </div>
    </div>

    <div id="messages" class="section">
        <h1>Love Messages 💌</h1>
        <p>I love you Sadri forever 💖</p>
    </div>

    <div id="about" class="section">
        <h1>About Us 💑</h1>
        <p>Zakaria & Sadri forever 💕</p>
    </div>

</div>

<script>
function login() {
    let u = document.getElementById('username').value;
    let p = document.getElementById('password').value;

    if (u === "Zakariamylove" && p === "sadrimylove") {
        document.getElementById('loginPage').style.display = "none";
        document.getElementById('mainPage').style.display = "block";
    } else {
        document.getElementById('error').innerText = "Wrong login 💔";
    }
}

function show(page) {
    let sections = document.querySelectorAll('.section');
    sections.forEach(s => s.classList.remove('active'));
    document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
